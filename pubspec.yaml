name: cineflow
description: "A TMDB movie browser built with Flutter, Riverpod, and Drift."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  back_stack: ^0.6.0
  cached_network_image_ce: ^4.9.0
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^3.3.2
  http: ^1.6.0
  skeletonizer: ^2.1.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  drift_dev: ^2.34.0

flutter:
  uses-material-design: true
